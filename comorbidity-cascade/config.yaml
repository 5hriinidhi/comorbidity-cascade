intervention:
  bmi_reduction: 5.0
  exercise_increase_steps: 3000
  sleep_target: 8.0
model:
  batch_norm: true
  dropout: 0.3
  encoder_dims: &id001
  - 256
  - 128
  hidden_dims: *id001
  task_head_dims:
  - 64
  - 1
nhanes:
  cycles:
  - 2015-2016
  - 2017-2018
  - 2019-2020
  modules:
    alcohol: ALQ
    blood_pressure: BPQ
    body_measures: BMX
    cardiac: MCQ
    cholesterol: TCHOL
    demographics: DEMO
    diabetes: DIQ
    diet: DR1TOT
    glucose: GLU
    kidney: KIQ_U
    physical_act: PAQ
    sleep: SLQ
    smoking: SMQ
paths:
  checkpoints: checkpoints/
  final_data: data/final/
  processed_data: data/processed/
  raw_data: data/raw/
  results: results/
training:
  batch_size: 256
  early_stop_patience: 15
  lambda_grid:
  - 0.05
  - 0.1
  - 0.15
  - 0.2
  - 0.25
  lambda_selected: 0.2
  lr: 0.001
  lr_schedule: cosine
  n_folds: 5
  weight_decay: 0.0001
